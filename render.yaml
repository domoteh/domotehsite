# Blueprint at repo root; service commands run relative to shop/
# See https://render.com/docs/monorepo-support
databases:
  - name: lmm-shop-db
    plan: free
    databaseName: lmm_shop
    user: lmm_shop

services:
  - type: web
    name: lmm-shop
    rootDir: shop
    plan: free
    runtime: python
    buildCommand: ./build.sh
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: lmm-shop-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12.4"
      - key: WEB_CONCURRENCY
        value: "2"
      - key: CLOUDINARY_URL
        sync: false
