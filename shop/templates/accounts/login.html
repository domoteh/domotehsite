{% extends "base.html" %}

{% block title %}Вхід — DOMOTEH{% endblock %}

{% block content %}
<div class="auth-form">
  <h1 class="auth-form__title">Вхід</h1>
  <form method="post">
    {% csrf_token %}
    {% for field in form %}
    <div class="form-group">
      <label for="{{ field.id_for_label }}">{{ field.label }}</label>
      <input type="{{ field.field.widget.input_type|default:'text' }}"
             name="{{ field.html_name }}"
             id="{{ field.id_for_label }}"
             class="form-input"
             {% if field.value %}value="{{ field.value }}"{% endif %}
             {% if field.field.required %}required{% endif %}>
      {% if field.errors %}<div class="form-errors">{{ field.errors.0 }}</div>{% endif %}
    </div>
    {% endfor %}
    <button type="submit" class="btn btn--primary" style="width:100%">Увійти</button>
  </form>
  <p style="text-align:center;margin-top:16px;font-size:0.9rem">
    Немає акаунту? <a href="{% url 'accounts:register' %}">Зареєструватися</a>
  </p>
</div>
{% endblock %}
