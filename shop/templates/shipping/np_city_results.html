{% if cities %}
<ul class="np-dropdown" role="listbox" aria-label="Результати пошуку міст">
  {% for city in cities %}
  <li class="np-dropdown__item"
      role="option"
      data-ref="{{ city.Ref }}"
      data-name="{{ city.Description }}"
      onclick="npSelectCity(this)">
    <span class="np-dropdown__name">{{ city.Description }}</span>
    {% if city.AreaDescription %}
    <span class="np-dropdown__area">{{ city.AreaDescription }} обл.</span>
    {% endif %}
  </li>
  {% endfor %}
</ul>
{% elif query %}
<p class="np-dropdown__empty">Нічого не знайдено за «{{ query }}»</p>
{% endif %}
